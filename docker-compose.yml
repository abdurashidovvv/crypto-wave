version: '3.9'

services:

  backend:
    build: ./backend
    container_name: cryptowave-backend
    restart: unless-stopped
    expose:
      - "8000"
    networks:
      - cryptonet

  frontend:
    build: ./frontend
    container_name: cryptowave-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - cryptonet

  nginx:
    image: nginx:alpine
    container_name: cryptowave-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - cryptonet

networks:
  cryptonet:
    driver: bridge
